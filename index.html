  <script src="https://kit.fontawesome.com/2d3fbab840.js" crossorigin="anonymous"></script>
  <style>
    /* --- הגדרות כלליות - Dark Mode קריר ונועז --- */
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Heebo', sans-serif;
      /* רקע כהה ועמוק עם גרדיאנט שמתכתב עם התאורה בתמונה */
      background: #0B1120;
      background-image: 
        radial-gradient(circle at 15% 10%, rgba(20, 184, 166, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 85% 90%, rgba(56, 189, 248, 0.15) 0%, transparent 40%);
      color: #E2E8F0;
      text-align: center;
      direction: rtl;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* --- הקונטיינר הראשי - אפקט Glassmorphism --- */
    .container {
      width: 100%;
      max-width: 440px;
      margin: 20px auto;
      padding: 48px 32px;
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* --- תמונת פרופיל - בולטת וזוהרת --- */
    .profile-img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 24px;
      /* מסגרת קרה שמתכתבת עם רקע התמונה */
      border: 3px solid #14B8A6; 
      box-shadow: 0 0 25px rgba(20, 184, 166, 0.3);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .profile-img:hover {
        transform: scale(1.03);
        box-shadow: 0 0 35px rgba(20, 184, 166, 0.5);
        border-color: #2DD4BF;
    }

    /* --- טקסטים וכותרות --- */
    h1 {
      font-size: 32px;
      font-weight: 800;
      margin: 0 0 4px;
      color: #FFFFFF;
      letter-spacing: -0.5px;
    }

    h2 {
      font-size: 18px;
      font-weight: 400;
      /* צבע כחול-טורקיז קריר להדגשת התפקיד */
      color: #2DD4BF; 
      margin: 0 0 24px;
      letter-spacing: 0.5px;
    }

    .description {
      font-size: 16px;
      color: #94A3B8;
      margin-bottom: 36px;
      line-height: 1.6;
      font-weight: 300;
    }

    /* --- קישורים - עיצוב אדג'י --- */
    .link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-right: 3px solid transparent; /* הכנה לאפקט הריחוף בצד ימין (RTL) */
      border-radius: 10px;
      padding: 16px;
      margin: 12px 0;
      text-decoration: none;
      color: #F1F5F9;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .link i {
        font-size: 20px;
        color: #94A3B8;
        transition: color 0.3s ease;
    }

    .link:hover {
      background: rgba(20, 184, 166, 0.1); /* רקע טורקיז עדין */
      border-color: rgba(20, 184, 166, 0.3);
      border-right: 3px solid #14B8A6; /* פס הדגשה נועז */
      transform: translateX(-4px); /* תזוזה קלה שמאלה בריחוף */
      color: #FFFFFF;
    }

    .link:hover i {
        color: #2DD4BF;
    }
    
    /* אנימציית כניסה */
    .link {
        opacity: 0;
        transform: translateY(15px);
        animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .link:nth-child(4) { animation-delay: 0.1s; }
    .link:nth-child(5) { animation-delay: 0.2s; }
    .link:nth-child(6) { animation-delay: 0.3s; }
    .link:nth-child(7) { animation-delay: 0.4s; }
    .link:nth-child(8) { animation-delay: 0.5s; }
    .link:nth-child(9) { animation-delay: 0.6s; }
    .link:nth-child(10) { animation-delay: 0.7s; }

    @keyframes slideUp {
        to {
            opacity: 1;
            transform: translateY(0) translateX(0);
        }
    }

    /* --- פוטר --- */
    footer {
      font-size: 13px;
      color: #64748B;
      margin-top: 48px;
      font-weight: 300;
      letter-spacing: 0.5px;
    }
  </style>
